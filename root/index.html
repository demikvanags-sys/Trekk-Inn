<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trekk-Inn</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>

  <body>
    <!--WELCOME SCREEN-->
    <section>
      <div id="welcome-screen"></div>
    </section>

    <!--NAV BAR-->
    <section>
      <nav id="nav-bar" style="display: none">
        <div class="header-container">
          <div class="burger-menu" id="open-menu">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </nav>
    </section>

    <!--HOME-->
    <section>
      <button id="showPaymentBtn">TEST CARD DETAILS</button>
    </section>

    <!--PRODUCT PAGE-->
    <section></section>

    <!--PRODUCT PAYMENT-->
    <section></section>

    <!--CARD DETAILS-->
    <section>
      <button id="showFormBtn">Continue to Payment TEST</button>

      <form id="paymentForm">
        <input
          id="emailInput"
          name="Email"
          type="email"
          placeholder="Email Address"
          required
        />
        <input
          id="nameInput"
          name="Name"
          type="text"
          placeholder="Full name on the card"
          required
        />
        <input
          id="CardTypeInput"
          name="Name"
          type="text"
          placeholder="Card Type"
          required
        />
        <input
          id="CardNumberInput"
          type="text"
          placeholder="Card Number"
          required
        />
        <input id="ExpiryInput" type="text" placeholder="MM/YY" required />
        <input id="CVVInput" type="text" placeholder="CVV" required />

        <input class="submitBtn" type="submit" />
      </form>
    </section>

    <!--CONFIRMATION-->
    <section>
      <div class="confirmation-screen">
        <div class="confirmation-text"></div>
        <span class="label">Order ID:""</span>
        <span class="value">#123456789</span>
        <h2>YOU ARE ALL SORTED!</h2>
      </div>
    </section>

    <!--MENU-->
    <section></section>

    <!--ABOUT US-->
    <section></section>

    <!--TERMS AND CONDITIONS-->

    <section></section>

    <!--FOOTER-->
    <section></section>
  </body>
</html>
